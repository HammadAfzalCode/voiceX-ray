services:
  backend:
    build:
      context: ./backend
    ports:
      - "${PORT:-3000}:3000"
    env_file: .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:3000}
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
